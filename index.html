<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0f0c29; 
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white; font-family: 'Inter', sans-serif; min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-primary {
            background: #00d2ff; border: none; font-weight: bold; border-radius: 10px; color: #000;
        }
        .btn-primary:hover {
            background: #00b8e6; color: #000;
        }
        .table { color: white; border-color: rgba(255,255,255,0.1); }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; background: #00ff88; color: #000; }
        .white-subtitle { color: #ffffff !important; opacity: 0.9; }
        
        /* Highlight row temporarily when updated */
        .flash-update { animation: flash 1.5s ease-out; }
        @keyframes flash { 0% { background-color: rgba(0, 210, 255, 0.3); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h1 class="fw-bold m-0 text-uppercase">Attendance Dashboard</h1>
                <p class="white-subtitle m-0 mt-1">Professional Attendance Terminal</p>
            </div>
            <div class="col-auto">
                <a href="/download" class="btn btn-primary shadow-sm px-4 py-2">Download CSV Data</a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-3">
                <div class="glass text-center h-100 d-flex flex-column justify-content-center">
                    <h6 class="text-uppercase text-muted small fw-bold">System Status</h6>
                    <div class="d-flex justify-content-center align-items-center mt-2">
                        <span class="status-badge me-2">ONLINE</span>
                        <span id="clock" class="h4 m-0 fw-bold">--:--:--</span>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="glass">
                    <h5 class="mb-4 fw-bold">Live Activity Stream</h5>
                    <div class="table-responsive">
                        <table class="table table-hover table-borderless align-middle">
                            <thead class="border-bottom border-secondary">
                                <tr>
                                    <th>User ID</th>
                                    <th>Full Name</th>
                                    <th>Check-in Time</th>
                                    <th>Check-out Time</th> <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="logTable">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket;
        
        // This object remembers who is currently checked in
        let activeSessions = {}; 

        window.onload = () => {
            websocket = new WebSocket(gateway);
            
            websocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const table = document.getElementById('logTable');
                
                // 1. Determine if Verified or Unverified
                let statusBadge = "";
                if (data.user === "Unknown User") {
                    statusBadge = `<span class="badge bg-danger rounded-pill">✖ Unverified</span>`;
                } else {
                    statusBadge = `<span class="badge bg-success rounded-pill">● Verified</span>`;
                }

                // 2. Check-In vs Check-Out Logic
                // If the user is known AND they are already in the activeSessions list
                if (data.user !== "Unknown User" && activeSessions[data.id]) {
                    
                    // IT IS A CHECK-OUT
                    let rowId = activeSessions[data.id];
                    let existingRow = document.getElementById(rowId);
                    
                    if (existingRow) {
                        // Update the 4th column (Check-out time)
                        existingRow.cells[3].innerHTML = `<span class="text-warning fw-bold">${data.time}</span>`;
                        existingRow.classList.add("flash-update"); // Give it a cool flash effect
                        
                        // Remove them from active sessions so the next tap is a new Check-in
                        delete activeSessions[data.id]; 
                    }
                    
                } else {
                    // IT IS A CHECK-IN (Or an Unknown User)
                    let rowId = "row-" + Date.now(); // Give the row a unique ID
                    
                    // Only track sessions for known users
                    if (data.user !== "Unknown User") {
                        activeSessions[data.id] = rowId; 
                    }

                    // Create the new row
                    const row = `<tr id="${rowId}">
                        <td class="fw-bold text-info">${data.id}</td>
                        <td>${data.user}</td>
                        <td class="text-success fw-bold">${data.time}</td>
                        <td class="text-muted">--:--:--</td> <td>${statusBadge}</td>
                    </tr>`;
                    
                    table.insertAdjacentHTML('afterbegin', row);
                }
            };
            
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString();
            }, 1000);
        };
    </script>
</body>
</html>
